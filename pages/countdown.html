<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sudah Bersama ❤️</title>

    <link rel="stylesheet" href="../css/countdown.css" />
  </head>
  <body>
    <div class="container">
      <h1>Sudah Bersama ❤️</h1>

      <div class="countdown-box">
        <div class="time">
          <span id="days">0</span>
          <small>Hari</small>
        </div>

        <div class="time">
          <span id="hours">0</span>
          <small>Jam</small>
        </div>

        <div class="time">
          <span id="minutes">0</span>
          <small>Menit</small>
        </div>

        <div class="time">
          <span id="seconds">0</span>
          <small>Detik</small>
        </div>
      </div>

      <p class="message">Terima kasih sudah menemani setiap hariku ❤️</p>

      <button onclick="window.location.href = 'timeline.html'">
        Lanjut ❤️
      </button>
    </div>

    <script src="../js/countdown.js"></script>
  </body>
</html>
