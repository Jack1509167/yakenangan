<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kado Untuk Kamu ❤️</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/envelope.css" />
    <link rel="stylesheet" href="css/animation.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Musik -->
    <audio id="bgMusic" loop>
      <source src="assets/music/lagu.mp3" type="audio/mpeg" />
    </audio>

    <!-- Hati Jatuh -->
    <div id="heart-container"></div>

    <!-- Opening -->
    <section id="welcome">
      <div class="welcome-box">
        <h1>Untuk Kamu ❤️</h1>

        <p>Ada sesuatu yang spesial yang ingin aku berikan...</p>

        <button id="openBtn">Buka Kado 🎁</button>
      </div>
    </section>

    <!-- Amplop -->
    <section id="envelopePage">
      <div class="envelope-container">
        <div class="envelope" id="envelope">
          <div class="envelope-front"></div>

          <div class="envelope-letter">
            <span>💌</span>
          </div>
        </div>

        <p>Klik amplopnya ❤️</p>
      </div>
    </section>

    <!-- Surat -->
    <section id="letterPage">
      <div class="letter-card">
        <h2>Hai Sayang ❤️</h2>

        <div id="typingText"></div>

        <button id="nextGallery">Lihat Kenangan Kita 📸</button>
      </div>
    </section>

    <script src="js/main.js"></script>
    <script src="js/envelope.js"></script>
  </body>
</html>
